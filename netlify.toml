[functions]
  directory = "netlify/functions"

# Never cache index.html — always serve fresh
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Never cache sw.js — browser must always check for updates
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Never cache JS/CSS bundles — force fresh on each version
[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Cache static assets aggressively (fonts, icons, manifest)
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
