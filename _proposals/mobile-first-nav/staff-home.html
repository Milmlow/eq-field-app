<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3DA8D8">
<title>EQ Field — Staff home (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
<style>
  :root {
    --navy: #1F335C;
    --navy-2: #2A4A7F;
    --blue: #3DA8D8;
    --blue-lt: #EFF4FF;
    --purple-lt: #EEEDF8;
    --purple: #7C77B9;
    --green: #16A34A;
    --green-lt: #F0FDF4;
    --amber: #D97706;
    --amber-lt: #FFFBEB;
    --red: #DC2626;
    --red-lt: #FEF2F2;
    --ink: #1A1A2E;
    --ink-2: #374151;
    --ink-3: #6B7280;
    --ink-4: #9CA3AF;
    --border: #E5E7EB;
    --surface: #FFFFFF;
    --bg: #F1F5F9;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 0;
  }
  .phone {
    width: 100%;
    max-width: 390px;
    background: var(--bg);
    min-height: 100vh;
  }
  @media (min-width: 768px) {
    body { padding: 40px 20px; align-items: center; }
    .phone {
      max-width: 390px;
      min-height: auto;
      height: 760px;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 10px 60px rgba(0,0,0,.15), 0 0 0 10px #1A1A2E, 0 0 0 11px #333;
    }
  }
  /* status bar (desktop only) */
  .status-bar {
    display: none;
    height: 28px;
    background: var(--bg);
    align-items: center;
    justify-content: space-between;
    padding: 0 22px 0 28px;
    font-size: 13px;
    font-weight: 500;
  }
  @media (min-width: 768px) { .status-bar { display: flex; } }

  .container { padding: 18px 16px 24px; }

  /* header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .brand-label {
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .greeting {
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    margin-top: 2px;
    letter-spacing: -0.3px;
  }
  .cog {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink-2);
    font-size: 20px;
    transition: background .15s;
  }
  .cog:active { background: var(--bg); }

  /* next-shift pill */
  .next-shift {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-sm);
  }
  .next-shift .icon-wrap {
    width: 36px; height: 36px; border-radius: var(--radius);
    background: var(--blue-lt);
    display: flex; align-items: center; justify-content: center;
    color: var(--blue);
    font-size: 18px;
    flex-shrink: 0;
  }
  .next-shift .label {
    font-size: 11px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .next-shift .value {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin-top: 1px;
  }
  .next-shift .chev {
    color: var(--ink-4);
    font-size: 18px;
  }

  /* tile grid */
  .tiles {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 14px;
    cursor: pointer;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 130px;
    position: relative;
    font-family: inherit;
    transition: transform .1s, box-shadow .15s;
    box-shadow: var(--shadow-sm);
  }
  .tile:active { transform: scale(0.98); }
  .tile .icon-wrap {
    width: 40px; height: 40px;
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .tile .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.1px;
  }
  .tile .sub {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 3px;
    font-weight: 400;
  }
  .badge {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 10px;
    letter-spacing: 0.2px;
  }
  .badge.warn { background: var(--amber-lt); color: var(--amber); }
  .badge.new  { background: var(--purple-lt); color: var(--purple); }

  /* tile colour variants */
  .tile.t-schedule  .icon-wrap { background: var(--blue-lt);   color: var(--blue); }
  .tile.t-time      .icon-wrap { background: var(--green-lt);  color: var(--green); }
  .tile.t-leave     .icon-wrap { background: var(--amber-lt);  color: var(--amber); }
  .tile.t-prestart  .icon-wrap { background: var(--purple-lt); color: var(--purple); }

  /* footer */
  .footer {
    text-align: center;
    margin-top: 22px;
    font-size: 11px;
    color: var(--ink-4);
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span><i class="ti ti-wifi"></i> &nbsp; <i class="ti ti-battery-3"></i></span>
    </div>

    <div class="container">

      <div class="header">
        <div>
          <div class="brand-label">EQ Field</div>
          <div class="greeting">G'day, Royce</div>
        </div>
        <button class="cog" aria-label="Settings and more">
          <i class="ti ti-settings"></i>
        </button>
      </div>

      <div class="next-shift">
        <div class="icon-wrap"><i class="ti ti-map-pin"></i></div>
        <div style="flex:1;">
          <div class="label">Next shift</div>
          <div class="value">Tomorrow &middot; SY9 &middot; 06:00</div>
        </div>
        <i class="ti ti-chevron-right chev"></i>
      </div>

      <div class="tiles">

        <button class="tile t-schedule">
          <div class="icon-wrap"><i class="ti ti-calendar-event"></i></div>
          <div>
            <div class="title">My schedule</div>
            <div class="sub">4 shifts this week</div>
          </div>
        </button>

        <button class="tile t-time">
          <span class="badge warn">Due Fri</span>
          <div class="icon-wrap"><i class="ti ti-clock-hour-4"></i></div>
          <div>
            <div class="title">Timesheets</div>
            <div class="sub">Submit this week</div>
          </div>
        </button>

        <button class="tile t-leave">
          <div class="icon-wrap"><i class="ti ti-plane"></i></div>
          <div>
            <div class="title">Leave</div>
            <div class="sub">Request time off</div>
          </div>
        </button>

        <button class="tile t-prestart">
          <span class="badge new">New</span>
          <div class="icon-wrap"><i class="ti ti-clipboard-check"></i></div>
          <div>
            <div class="title">Pre-starts</div>
            <div class="sub">Toolboxes &amp; SWMS</div>
          </div>
        </button>

      </div>

      <div class="footer">EQ Field &middot; v3.5.0-preview</div>

    </div>
  </div>
</body>
</html>
